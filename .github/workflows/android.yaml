name: Setup Android SDK

on:
  push:
    branches:
      - main
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permissions
        run: |
          chmod +x GiftcardSite/gradlew

      - name: Build
        working-directory: GiftcardSite
        run: |
          ./gradlew build